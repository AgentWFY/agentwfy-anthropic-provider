<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Anthropic Provider Settings</title>
  <style>
    body {
      padding: 24px;
      max-width: 480px;
      margin: 0 auto;
    }
    h1 {
      font-size: 18px;
      font-weight: 600;
      color: var(--color-text4);
      margin: 0 0 20px;
    }
    .section {
      margin-bottom: 16px;
    }
    .section-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--color-text3);
      margin-bottom: 10px;
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .field-label {
      font-size: 11px;
      color: var(--color-text2);
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    .field-row {
      display: flex;
      gap: 6px;
      align-items: stretch;
    }
    .field-row input, .field-row select {
      flex: 1;
      min-width: 0;
    }
    input, select {
      padding: 6px 8px;
      border: 1px solid var(--color-input-border);
      border-radius: var(--radius-sm);
      background: var(--color-input-bg);
      color: var(--color-text3);
      font-size: 13px;
      font-family: var(--font-family);
      outline: none;
    }
    input:focus, select:focus {
      border-color: var(--color-focus-border);
    }
    .btn {
      padding: 5px 14px;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      background: var(--color-bg3);
      cursor: pointer;
      font-size: 12px;
      color: var(--color-text3);
      white-space: nowrap;
      font-family: var(--font-family);
    }
    .btn:hover { background: var(--color-item-hover); }
    .btn.btn-accent {
      background: var(--color-accent);
      color: #fff;
      border-color: var(--color-accent);
    }
    .btn.btn-accent:hover {
      background: var(--color-accent);
      filter: brightness(1.15);
    }
    .btn-danger {
      color: var(--color-red-fg);
      border-color: var(--color-red-fg);
    }
    .btn-danger:hover { background: var(--color-red-bg); }
    .status {
      font-size: 12px;
      padding: 6px 10px;
      border-radius: var(--radius-sm);
      margin-top: 8px;
      display: none;
    }
    .status.success {
      display: block;
      background: var(--color-green-bg);
      color: var(--color-green-fg);
    }
    .status.error {
      display: block;
      background: var(--color-red-bg);
      color: var(--color-red-fg);
    }
    .status.info {
      display: block;
      background: var(--color-bg3);
      color: var(--color-text3);
    }
    .auth-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .auth-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .auth-dot.on { background: var(--color-green-fg); }
    .auth-dot.off { background: var(--color-text2); }
    .auth-text {
      font-size: 12px;
      flex: 1;
    }
    .divider {
      height: 1px;
      background: var(--color-border);
      margin: 16px 0;
    }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <h1>Anthropic</h1>

  <!-- Auth -->
  <div class="section">
    <div class="section-label">Claude Pro / Max</div>
    <div id="authDisconnected">
      <div class="auth-row" style="margin-bottom:8px">
        <span class="auth-dot off"></span>
        <span class="auth-text" style="color:var(--color-text2)">Not connected</span>
      </div>
      <button class="btn btn-accent" id="loginBtn" style="width:100%">Log in with Claude</button>
      <div id="codeSection" class="hidden" style="margin-top:10px">
        <div class="field">
          <span class="field-label">Paste authorization code</span>
          <div class="field-row">
            <input type="text" id="authCode" placeholder="code#state or URL">
            <button class="btn btn-accent" id="submitCode">Submit</button>
          </div>
        </div>
      </div>
    </div>
    <div id="authConnected" class="hidden">
      <div class="auth-row">
        <span class="auth-dot on"></span>
        <span class="auth-text" style="color:var(--color-green-fg);font-weight:500">Connected</span>
        <button class="btn btn-danger" id="logoutBtn">Log out</button>
      </div>
    </div>
  </div>

  <div class="divider"></div>

  <!-- Model -->
  <div class="section">
    <div class="section-label">Model</div>
    <select id="modelId" style="width:100%">
      <option value="claude-sonnet-4-6">Claude Sonnet 4.6</option>
      <option value="claude-opus-4-6">Claude Opus 4.6</option>
      <option value="claude-sonnet-4-5">Claude Sonnet 4.5</option>
      <option value="claude-opus-4-5">Claude Opus 4.5</option>
      <option value="claude-sonnet-4-0">Claude Sonnet 4</option>
      <option value="claude-opus-4-0">Claude Opus 4</option>
      <option value="claude-haiku-4-5">Claude Haiku 4.5</option>
      <option value="claude-3-7-sonnet-latest">Claude Sonnet 3.7</option>
      <option value="claude-3-5-haiku-latest">Claude Haiku 3.5</option>
    </select>
  </div>

  <div class="divider"></div>

  <!-- Max tokens -->
  <div class="section">
    <div class="section-label">Max Output Tokens</div>
    <div class="field-row">
      <input type="number" id="maxTokens" placeholder="16384">
      <button class="btn" id="saveMaxTokens">Save</button>
    </div>
  </div>

  <div class="divider"></div>

  <!-- Display options -->
  <div class="section">
    <div class="section-label">Display</div>
    <label style="display:flex;align-items:center;gap:8px;cursor:pointer;margin-bottom:8px">
      <input type="checkbox" id="hideThinking">
      <span style="font-size:13px;color:var(--color-text3)">Hide thinking messages</span>
    </label>
    <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
      <input type="checkbox" id="hideIntermediateSteps">
      <span style="font-size:13px;color:var(--color-text3)">Hide intermediate steps (show only final answer)</span>
    </label>
  </div>

  <div class="status" id="status"></div>

  <script>
    const $ = (sel) => document.querySelector(sel);

    const KEYS = {
      modelId: 'plugin.anthropic-provider.modelId',
      maxTokens: 'plugin.anthropic-provider.maxTokens',
      oauthAccess: 'plugin.anthropic-provider.oauthAccess',
      oauthRefresh: 'plugin.anthropic-provider.oauthRefresh',
      oauthExpires: 'plugin.anthropic-provider.oauthExpires',
      hideThinking: 'plugin.anthropic-provider.hideThinking',
      hideIntermediateSteps: 'plugin.anthropic-provider.hideIntermediateSteps',
    };

    const OAUTH = {
      clientId: '9d1c250a-e61b-44d9-88ed-5944d1962f5e',
      authorizeUrl: 'https://claude.ai/oauth/authorize',
      tokenUrl: 'https://platform.claude.com/v1/oauth/token',
      redirectUri: 'https://console.anthropic.com/oauth/code/callback',
      scopes: 'org:create_api_key user:profile user:inference',
    };

    let _pkceVerifier = null;

    // ── PKCE ──

    function base64UrlEncode(bytes) {
      let binary = '';
      for (const byte of bytes) binary += String.fromCharCode(byte);
      return btoa(binary).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
    }

    async function generatePKCE() {
      const array = new Uint8Array(32);
      crypto.getRandomValues(array);
      const verifier = base64UrlEncode(array);
      const data = new TextEncoder().encode(verifier);
      const hash = await crypto.subtle.digest('SHA-256', data);
      const challenge = base64UrlEncode(new Uint8Array(hash));
      return { verifier, challenge };
    }

    function parseAuthInput(input) {
      const value = input.trim();
      if (!value) return {};
      try {
        const url = new URL(value);
        return { code: url.searchParams.get('code'), state: url.searchParams.get('state') };
      } catch {}
      if (value.includes('#')) {
        const [code, state] = value.split('#', 2);
        return { code, state };
      }
      if (value.includes('code=')) {
        const params = new URLSearchParams(value);
        return { code: params.get('code'), state: params.get('state') };
      }
      return { code: value };
    }

    // ── Status ──

    function showStatus(msg, type) {
      const el = $('#status');
      el.textContent = msg;
      el.className = 'status ' + type;
      if (type === 'success') {
        setTimeout(() => { el.className = 'status'; }, 2000);
      }
    }

    // ── Config helpers ──

    async function getConfigValue(name) {
      const rows = await window.agentwfy.runSql({
        target: 'agent',
        sql: 'SELECT value FROM config WHERE name = ?',
        params: [name],
      });
      if (rows.length === 0 || rows[0].value === null) return undefined;
      try { return JSON.parse(rows[0].value); } catch { return undefined; }
    }

    async function saveValue(name, value) {
      try {
        await window.agentwfy.runSql({
          target: 'agent',
          sql: 'UPDATE config SET value = ? WHERE name = ?',
          params: [JSON.stringify(value), name],
        });
        return true;
      } catch (e) {
        showStatus('Error: ' + e.message, 'error');
        return false;
      }
    }

    async function clearValue(name) {
      await window.agentwfy.runSql({
        target: 'agent',
        sql: 'UPDATE config SET value = NULL WHERE name = ?',
        params: [name],
      });
    }

    // ── Auth UI ──

    async function updateAuthUI() {
      const access = await getConfigValue(KEYS.oauthAccess);
      if (access) {
        $('#authDisconnected').classList.add('hidden');
        $('#authConnected').classList.remove('hidden');
      } else {
        $('#authDisconnected').classList.remove('hidden');
        $('#authConnected').classList.add('hidden');
        $('#codeSection').classList.add('hidden');
      }
    }

    // ── OAuth login ──

    $('#loginBtn').addEventListener('click', async () => {
      const { verifier, challenge } = await generatePKCE();
      _pkceVerifier = verifier;

      const authUrl = new URL(OAUTH.authorizeUrl);
      authUrl.searchParams.set('code', 'true');
      authUrl.searchParams.set('client_id', OAUTH.clientId);
      authUrl.searchParams.set('response_type', 'code');
      authUrl.searchParams.set('redirect_uri', OAUTH.redirectUri);
      authUrl.searchParams.set('scope', OAUTH.scopes);
      authUrl.searchParams.set('code_challenge', challenge);
      authUrl.searchParams.set('code_challenge_method', 'S256');
      authUrl.searchParams.set('state', verifier);

      await window.agentwfy.openExternal(authUrl.toString());
      $('#codeSection').classList.remove('hidden');
      $('#authCode').focus();
      showStatus('After logging in, paste the authorization code below.', 'info');
    });

    $('#submitCode').addEventListener('click', async () => {
      const input = $('#authCode').value;
      const parsed = parseAuthInput(input);
      if (!parsed.code) {
        showStatus('Invalid authorization code', 'error');
        return;
      }

      showStatus('Exchanging code...', 'info');

      try {
        const response = await fetch(OAUTH.tokenUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            grant_type: 'authorization_code',
            client_id: OAUTH.clientId,
            code: parsed.code,
            state: parsed.state || '',
            redirect_uri: OAUTH.redirectUri,
            code_verifier: _pkceVerifier,
          }),
        });

        if (!response.ok) {
          const text = await response.text().catch(() => '');
          showStatus('Login failed (' + response.status + '): ' + (text || response.statusText), 'error');
          return;
        }

        const payload = await response.json();
        if (!payload.access_token || !payload.refresh_token || typeof payload.expires_in !== 'number') {
          showStatus('Token response missing required fields', 'error');
          return;
        }

        const expires = Date.now() + payload.expires_in * 1000 - 5 * 60 * 1000;
        await saveValue(KEYS.oauthAccess, payload.access_token);
        await saveValue(KEYS.oauthRefresh, payload.refresh_token);
        await saveValue(KEYS.oauthExpires, expires);

        _pkceVerifier = null;
        $('#authCode').value = '';
        showStatus('Logged in successfully', 'success');
        updateAuthUI();
      } catch (e) {
        showStatus('Login error: ' + e.message, 'error');
      }
    });

    $('#logoutBtn').addEventListener('click', async () => {
      await clearValue(KEYS.oauthAccess);
      await clearValue(KEYS.oauthRefresh);
      await clearValue(KEYS.oauthExpires);
      showStatus('Logged out', 'success');
      updateAuthUI();
    });

    // ── Config fields ──

    $('#modelId').addEventListener('change', async () => {
      if (await saveValue(KEYS.modelId, $('#modelId').value)) showStatus('Saved', 'success');
    });
    $('#saveMaxTokens').addEventListener('click', async () => {
      const val = parseInt($('#maxTokens').value, 10);
      if (await saveValue(KEYS.maxTokens, isNaN(val) ? 16384 : val)) showStatus('Saved', 'success');
    });
    $('#hideThinking').addEventListener('change', async () => {
      if (await saveValue(KEYS.hideThinking, $('#hideThinking').checked)) showStatus('Saved', 'success');
    });
    $('#hideIntermediateSteps').addEventListener('change', async () => {
      if (await saveValue(KEYS.hideIntermediateSteps, $('#hideIntermediateSteps').checked)) showStatus('Saved', 'success');
    });

    // ── Load ──

    async function loadConfig() {
      try {
        const rows = await window.agentwfy.runSql({
          target: 'agent',
          sql: "SELECT name, value FROM config WHERE name LIKE 'plugin.anthropic-provider.%'",
        });
        for (const row of rows) {
          if (row.value === null) continue;
          const val = JSON.parse(row.value);
          if (row.name === KEYS.modelId) $('#modelId').value = val;
          else if (row.name === KEYS.maxTokens) $('#maxTokens').value = val || 16384;
          else if (row.name === KEYS.hideThinking) $('#hideThinking').checked = !!val;
          else if (row.name === KEYS.hideIntermediateSteps) $('#hideIntermediateSteps').checked = !!val;
        }
      } catch (e) {
        console.error('Failed to load config', e);
      }
      updateAuthUI();
    }

    loadConfig();
  </script>
</body>
</html>
